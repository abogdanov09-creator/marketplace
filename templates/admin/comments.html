<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Комментарии — Админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlacer</a>
        <a class="nav-link text-white" href="/admin">Дашборд</a>
        <a class="nav-link text-white" href="/admin/products">Товары</a>
        <a class="nav-link text-white" href="/admin/comments">Комментарии</a>
        <a class="nav-link text-white" href="/admin/users">Пользователи</a>
        <a class="nav-link text-white" href="/">На сайт</a>
    </div>
</nav>
<div class="container mt-4">
    <h2>💬 Управление комментариями</h2>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr><th>ID</th><th>Товар</th><th>Автор</th><th>Текст</th><th>Дата</th><th>Действия</th></tr>
        </thead>
        <tbody>
            {% for comment in comments %}
            <tr>
                <td>{{ comment.id }}</td>
                <td>{{ comment.product_name }}</td>
                <td>{{ comment.author }}</td>
                <td>{{ comment.text }}</td>
                <td>{{ comment.created_at }}</td>
                <td>
                    <a href="/admin/comments/{{ comment.id }}/delete" class="btn btn-sm btn-danger" onclick="return confirm('Удалить комментарий?')">🗑️</a>
                 </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
