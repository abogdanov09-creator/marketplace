<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — MarketPlacer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlacer</a>
        <a href="/cart" class="btn btn-outline-light me-2">🛒 Корзина</a>
        <a href="/wishlist" class="btn btn-outline-light me-2">❤️ Избранное</a>
        <a href="/" class="btn btn-outline-light">← На главную</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <i class="fas fa-user-circle fa-5x text-primary mb-3"></i>
                    <h4>{{ user.username }}</h4>
                    <p class="text-muted">{{ user.email }}</p>
                    {% if user.is_admin %}
                        <span class="badge bg-danger">Администратор</span>
                    {% endif %}
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>Информация об аккаунте</h5>
                </div>
                <div class="card-body">
                    <table class="table">
                        <tr><th>ID:</th><td>{{ user.id }}</td></tr>
                        <tr><th>Имя:</th><td>{{ user.username }}</td></tr>
                        <tr><th>Email:</th><td>{{ user.email }}</td></tr>
                        <tr><th>Зарегистрирован:</th><td>{{ user.created_at }}</td></tr>
                    </table>
                    <a href="/" class="btn btn-primary">Перейти к покупкам</a>
                    <button id="logoutBtn" class="btn btn-danger">Выйти</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/';
});
</script>

</body>
</html>
