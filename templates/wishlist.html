<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Избранное — MarketPlacer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: 0.3s; margin-bottom: 20px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price { font-size: 1.2rem; font-weight: bold; color: #198754; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlacer</a>
        <div class="ms-auto d-flex align-items-center">
            {% set username = request.cookies.get('username') %}
            {% if username %}
                <span class="text-white me-2">Привет, {{ username }}!</span>
                <a href="/profile" class="btn btn-outline-light btn-sm me-2">Профиль</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm me-2">Выйти</button>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm me-2">Вход</a>
                <a href="/register" class="btn btn-outline-light btn-sm me-2">Регистрация</a>
            {% endif %}
            <a href="/cart" class="btn btn-outline-light btn-sm me-2">🛒 Корзина</a>
            <a href="/wishlist" class="btn btn-outline-light btn-sm">❤️ Избранное</a>
        </div>
    </div>
</nav>

<script>
function logout() {
    fetch('/api/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/');
}
</script>

<div class="container mt-4">
    <h2>❤️ Избранное</h2>
    <hr>
    <div id="wishlist-content">Загрузка...</div>
</div>

<script>
function loadWishlist() {
    fetch('/api/wishlist')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('wishlist-content');
            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <h3>Избранное пусто</h3>
                        <a href="/" class="btn btn-primary mt-3">Перейти к покупкам</a>
                    </div>
                `;
                return;
            }

            let html = '<div class="row">';
            data.forEach(product => {
                html += `
                    <div class="col-md-4 col-lg-3 mb-4">
                        <div class="card product-card">
                            <div class="card-body">
                                <h5>${escapeHtml(product.name)}</h5>
                                <span class="badge bg-secondary">${product.category}</span>
                                <div class="price mt-2">$${product.price}</div>
                                <div class="d-grid gap-2 mt-3">
                                    <button class="btn btn-sm btn-primary" onclick="addToCart(${product.id})">
                                        🛒 В корзину
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="removeFromWishlist(${product.id})">
                                        ❤️ Удалить
                                    </button>
                                    <a href="/product/${product.id}" class="btn btn-sm btn-outline-secondary">Подробнее</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        });
}

function addToCart(productId) {
    fetch(`/api/cart/add/${productId}`, { method: 'POST' })
        .then(() => {
            alert('✅ Товар добавлен в корзину');
        });
}

function removeFromWishlist(productId) {
    fetch(`/api/wishlist/remove/${productId}`, { method: 'POST' })
        .then(() => {
            loadWishlist();
        });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadWishlist();
</script>

</body>
</html>
