<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — MarketPlacer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-4">
            <div class="card p-4">
                <h3 class="text-center mb-4">🔐 Вход</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="text" id="username" class="form-control" placeholder="Имя пользователя или Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="/register">Нет аккаунта? Зарегистрироваться</a>
                </div>
                <div class="text-center mt-3">
                    <small class="text-muted">Тестовый админ: admin / admin123</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const formData = new URLSearchParams();
    formData.append('username', username);
    formData.append('password', password);

    const res = await fetch('/api/auth/login', { method: 'POST', body: formData });
    const data = await res.json();

    if (res.ok) {
        alert('✅ Вход выполнен!');
        window.location.href = '/';
    } else {
        alert('❌ ' + data.detail);
    }
});
</script>
</body>
</html>
