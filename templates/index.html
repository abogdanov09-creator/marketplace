<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MarketPlacer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: 0.3s; margin-bottom: 20px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price { font-size: 1.3rem; font-weight: bold; color: #198754; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; padding: 50px; margin-bottom: 40px; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlacer</a>
        <a href="/cart" class="btn btn-outline-light me-2">🛒 Корзина</a>
        <a href="/wishlist" class="btn btn-outline-light">❤️ Избранное</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="hero text-center">
        <h1>🛍️ Добро пожаловать в MarketPlacer</h1>
        <p>Лучшие товары по лучшим ценам</p>
    </div>

    <div class="row">
        {% for product in products %}
        <div class="col-md-4 col-lg-3 mb-4">
            <div class="card product-card">
                <div class="card-body">
                    <h5>{{ product.name }}</h5>
                    <span class="badge bg-secondary">{{ product.category }}</span>
                    <div class="price mt-2">${{ product.price }}</div>
                    <p class="mt-2 text-muted small">{{ product.description[:80] }}...</p>

                    <div class="d-grid gap-2 mt-2">
                        <button class="btn btn-primary" onclick="addToCart({{ product.id }})">
                            🛒 В корзину
                        </button>
                        <button class="btn btn-outline-danger" onclick="addToWishlist({{ product.id }}, this)">
                            ❤️ В избранное
                        </button>
                        <a href="/product/{{ product.id }}" class="btn btn-outline-secondary">Подробнее</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function addToCart(productId) {
    fetch(`/api/cart/add/${productId}`, { method: 'POST' })
        .then(() => {
            alert('✅ Товар добавлен в корзину!');
        });
}

function addToWishlist(productId, btn) {
    fetch(`/api/wishlist/add/${productId}`, { method: 'POST' })
        .then(() => {
            btn.innerHTML = '✅ В избранном';
            btn.disabled = true;
            alert('❤️ Товар добавлен в избранное!');
        });
}
</script>

</body>
</html>
